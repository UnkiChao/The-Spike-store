<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>組合查詢結果</title>
    <style>
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            margin: 0; 
            padding: 15px; 
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 800px; margin: 0 auto; }
        
        h1 { text-align: center; color: #58a6ff; margin: 10px 0 20px; font-size: 24px; }

        /* 頂部篩選資訊 */
        .search-summary {
            background: #161b22;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .search-summary span { color: #58a6ff; font-weight: bold; }

        /* 結果卡片 */
        .result-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            transition: 0.2s;
        }
        .result-card:hover { border-color: #58a6ff; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .acc-info h2 { 
            margin: 0; 
            font-size: 16px; 
            color: #ffffff; 
            font-family: monospace; 
            word-break: break-all; 
        }
        .match-badge {
            display: inline-block;
            background: #238636;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 5px;
        }

        /* 價格與按鈕區 */
        .action-zone { text-align: right; }
        .price { font-size: 20px; color: #f2994a; font-weight: bold; display: block; }
        
        .copy-btn {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 5px;
        }

        /* 縮小版角色圖卡樣式 */
        .mini-role-list {
            display: flex;
            flex-wrap: wrap; /* 重要：手機版自動換行 */
            gap: 6px;
            margin: 12px 0;
        }
        .mini-card {
            width: 50px; /* 手機版再縮小一點點 */
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            overflow: hidden;
            text-align: center;
        }
        .mini-card.hit {
            border-color: #38bdf8;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.3);
        }
        .mini-card img {
            width: 100%;
            height: 68px;
            object-fit: cover;
            display: block;
        }
        .mini-name {
            font-size: 9px;
            padding: 2px 0;
            background: #161b22;
            color: #8b949e;
            white-space: nowrap;
            overflow: hidden;
        }
        .mini-card.hit .mini-name { color: #38bdf8; }

        /* 文字標籤 */
        .role-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 15px; }
        .tag { 
            padding: 1px 6px; 
            background: #0d1117; 
            border: 1px solid #30363d; 
            border-radius: 4px; 
            font-size: 11px; 
            color: #8b949e; 
        }
        .tag.hit { border-color: #38bdf8; color: #38bdf8; }

        .btn-link {
            display: block;
            background: #238636;
            color: white;
            text-align: center;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        /* 手機版 RWD 優化 */
        @media (max-width: 600px) {
            .card-header {
                flex-direction: row; /* 保持橫向但調整比例 */
            }
            .acc-info { flex: 1; }
            .action-zone { min-width: 80px; }
            .price { font-size: 18px; }
            .copy-btn { width: 100%; padding: 8px 0; }
            
            .mini-card { width: calc(25% - 6px); } /* 四隻一排 */
            .mini-card img { height: 60px; }
        }

        .no-result { text-align: center; padding: 40px 20px; color: #8b949e; }
        .back-link { text-align: center; margin: 20px 0 40px; }
        .back-link a { color: #58a6ff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>查詢結果</h1>
    <div class="search-summary" id="search-summary">正在分析...</div>
    <div id="results-list"></div>
    <div class="back-link"><a href="index.html">← 返回重新選擇</a></div>
</div>

<script src="data.js"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const selectedTags = urlParams.get('tags') ? urlParams.get('tags').split(',') : [];
    const listElement = document.getElementById('results-list');
    const summaryElement = document.getElementById('search-summary');

    function getRoleName(code) {
        return (typeof roleMap !== 'undefined' && roleMap[code]) ? roleMap[code] : code;
    }

    function getImagePath(code) {
        const prefix = code.substring(0, 2).toUpperCase();
        const name = getRoleName(code);
        const folderMap = { "ST": "smallteam",

            "NK": "nkingseat",

            "CR": "cursereligion",

            "HE": "hellexplode",

            "SM": "secretmethod",

            "SA": "stararrow",

            "NN": "noname",

            "CH": "chaos",

            "HJ": "highjudge" };
        let folder = folderMap[prefix] || "st";
        return `image/${folder}/${name}.png`;
    }

    function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const oldText = btn.innerText;
            btn.innerText = "已複製";
            setTimeout(() => btn.innerText = oldText, 1500);
        });
    }

    if (selectedTags.length === 0) {
        summaryElement.innerHTML = "尚未選取角色。";
        listElement.innerHTML = '<div class="no-result">請先返回首頁選擇。</div>';
    } else {
        summaryElement.innerHTML = `已選角色：<span>${selectedTags.map(t => getRoleName(t)).join(', ')}</span>`;

        let results = accountDatabase.map(acc => {
            const hitCount = selectedTags.filter(tag => acc.id.includes(tag)).length;
            return { ...acc, hitCount };
        });

        let filtered = results.filter(acc => acc.hitCount > 0);
        filtered.sort((a, b) => b.hitCount - a.hitCount);

        if (filtered.length === 0) {
            listElement.innerHTML = '<div class="no-result">找不到符合任何一個角色的帳號。</div>';
        } else {
            listElement.innerHTML = ''; 
            filtered.forEach(acc => {
                const card = document.createElement('div');
                card.className = 'result-card';
                
                const miniCardsHTML = acc.roles.map(rCode => {
                    const isHit = selectedTags.includes(rCode) ? 'hit' : '';
                    return `
                        <div class="mini-card ${isHit}">
                            <img src="${getImagePath(rCode)}" onerror="this.src='image/placeholder.png'">
                            <div class="mini-name">${getRoleName(rCode)}</div>
                        </div>
                    `;
                }).join('');

                card.innerHTML = `
                    <div class="card-header">
                        <div class="acc-info">
                            <h2>ID: ${acc.id} - ${acc.name}</h2>
                            <div class="match-badge">命中 ${acc.hitCount} 位角色</div>
                        </div>
                        <div class="action-zone">
                            <span class="price">$${acc.price}</span>
                            <button class="copy-btn" onclick="copyText('${acc.id}', this)">複製 ID</button>
                        </div>
                    </div>
                    <div class="mini-role-list">${miniCardsHTML}</div>
                    <a href="${acc.link}" target="_blank" class="btn-link">前往賣場</a>
                `;
                listElement.appendChild(card);
            });
        }
    }

    // 開發者工具
    document.addEventListener('keydown', function(e) {
        if (e.key === '\\') {
            const urlParams = new URLSearchParams(window.location.search);
            const tagsParam = urlParams.get('tags'); 
            if (!tagsParam) return;
            const tagsArray = tagsParam.split(',');
            const generatedID = tagsArray.join('');
            const finalCode = `{ 
    id: "${generatedID}", 
    name: "",
    roles: ${JSON.stringify(tagsArray)},
    price: "", 
    link: "https://google.com" 
},\n`;
            navigator.clipboard.writeText(finalCode).then(() => {
                const toast = document.createElement('div');
                toast.innerText = "已複製物件";
                toast.style.cssText = "position:fixed; bottom:20px; right:20px; background:#238636; color:white; padding:10px 20px; border-radius:5px; z-index:9999; font-size:12px;";
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 1500);
            });
        }
    });
</script>

</body>
</html>
