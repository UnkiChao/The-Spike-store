<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>秘法會 - 組合帳號查詢</title>
    <style>
        /* 延用原本的深色與青藍色風格 */
        body { font-family: Arial, sans-serif; background-color: #0a0d14; margin: 0; padding: 15px; padding-bottom: 120px; color: #fff; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: #4cc9f0; margin-bottom: 20px; text-shadow: 0 0 15px rgba(76, 201, 240, 0.5); font-size: 24px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 172px);
            gap: 15px;
            justify-content: center;
        }

        .card {
            background: #161b22;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            border: 3px solid transparent;
            position: relative;
            user-select: none;
        }

        .card.selected {
            border-color: #4cc9f0;
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(76, 201, 240, 0.6);
        }

        .card.selected::after {
            content: '✓';
            position: absolute;
            top: 8px; right: 8px;
            background: #4cc9f0;
            color: white;
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 14px; font-weight: bold; z-index: 2;
        }

        .card img { width: 100%; height: 252px; object-fit: cover; display: block; pointer-events: none; }

        .card-content {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(10, 13, 20, 0.95)); 
            padding: 20px 0 10px 0;
            text-align: center; pointer-events: none;
        }

        .card-title { font-size: 15px; font-weight: bold; color: #e0f7fa; }

        /* 統一 FooterBar：透明背景，不擋點擊 */
        .footer-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(13, 17, 23, 0); 
            padding: 20px 0;
            display: flex; justify-content: center; z-index: 1000;
            pointer-events: none; 
        }

        .confirm-btn {
            pointer-events: auto; /* 恢復按鈕點擊 */
            background-color: #4cc9f0;
            color: #0a0d14;
            border: none;
            width: 85%;
            max-width: 300px;
            padding: 12px 0;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(76, 201, 240, 0.3);
        }

        .confirm-btn:hover { background-color: #4895ef; color: #fff; transform: scale(1.05); }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .card img { height: 200px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>秘法會 - 組合帳號查詢</h1>
    <div class="grid" id="product-list"></div>
</div>

<div class="footer-bar">
    <button class="confirm-btn" id="confirm-btn">返回選陣營</button>
</div>

<script>
    var gameItems = [
        { name: '卡埃德', code: 'SM01' }, { name: '弗恩', code: 'SM02' }, { name: '瓦蕾亞', code: 'SM03' }, { name: '伊尼特', code: 'SM04' },
        { name: '托爾斯克', code: 'SM05' }, { name: '艾洛溫', code: 'SM06' }, { name: '艾瑞斯', code: 'SM07' }, { name: '克美特', code: 'SM08' },
        { name: '努美拉', code: 'SM09' }, { name: '奈理莎', code: 'SM10' }, { name: '居魯士', code: 'SM11' }, { name: '波瑞斯', code: 'SM12' },
        { name: '阿諾菈', code: 'SM13' }, { name: '哪吒', code: 'SM14' }, { name: '埃澤恩', code: 'SM15' }, { name: '娜斯伽', code: 'SM16' },
        { name: '馬爾里克', code: 'SM17' }, { name: '莫里登', code: 'SM18' }, { name: '萊拉', code: 'SM19' }, { name: '塔倫', code: 'SM20' },
        { name: '達麗亞', code: 'SM21' }, { name: '達蘇彌', code: 'SM22' }, { name: '碧雅翡絲', code: 'SM23' }, { name: '維諾瑪', code: 'SM24' },
        { name: '緋爾沙', code: 'SM25' }, { name: '赫爾加', code: 'SM26' }, { name: '賽勒涅', code: 'SM27' }, { name: '賽雷菲娜', code: 'SM28' }
    ];

    var listElement = document.getElementById('product-list');
    var confirmBtn = document.getElementById('confirm-btn');

    // --- 關鍵修改：使用 localStorage 同步所有選取 ---
    var selectedRoles = new Set(JSON.parse(localStorage.getItem('selectedRoles') || '[]'));

    function updateButton() {
        const count = selectedRoles.size;
        confirmBtn.innerText = count > 0 ? `確認並返回 (${count})` : '返回選陣營';
        localStorage.setItem('selectedRoles', JSON.stringify(Array.from(selectedRoles)));
    }

    gameItems.forEach(function(item) {
        var div = document.createElement('div');
        div.className = 'card';
        
        // 初始載入時檢查是否已選取
        if (selectedRoles.has(item.code)) {
            div.classList.add('selected');
        }

        div.innerHTML = `
            <img src="image/secretmethod/${item.name}.png" alt="${item.name}" onerror="this.src='image/placeholder.png'">
            <div class="card-content">
                <div class="card-title">${item.name}</div>
            </div>
        `;
        
        div.onclick = function() {
            if (selectedRoles.has(item.code)) {
                selectedRoles.delete(item.code);
                div.classList.remove('selected');
            } else {
                selectedRoles.add(item.code);
                div.classList.add('selected');
            }
            updateButton();
        };
        
        listElement.appendChild(div);
    });

    updateButton();

    confirmBtn.onclick = function() {
        // 返回陣營主選單，而不是直接去結果頁
        window.location.href = 'index.html';
    };
</script>

</body>
</html>
