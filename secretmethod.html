<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秘法會 - 組合帳號查詢</title>
    <style>
        /* 採用深藍與神祕紫配色 */
        body { font-family: Arial, sans-serif; background-color: #0a0d14; margin: 0; padding: 20px; padding-bottom: 100px; color: #fff; }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: #4cc9f0; margin-bottom: 30px; text-shadow: 0 0 15px rgba(76, 201, 240, 0.5); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 172px);
            gap: 15px;
            justify-content: center;
        }

        .card {
            background: #161b22;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            border: 3px solid transparent;
            position: relative;
        }

        /* 選取狀態：青藍色魔法發光邊框 */
        .card.selected {
            border-color: #4cc9f0;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(76, 201, 240, 0.4);
        }

        /* 勾選圖示 */
        .card.selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 8px;
            background: #4cc9f0;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            z-index: 2;
        }

        .card img {
            width: 100%;
            height: 252px;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        .card-content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(10, 13, 20, 0.95)); 
            padding: 15px 0 8px 0;
            text-align: center;
            pointer-events: none;
        }

        .card-title { 
            font-size: 15px; 
            font-weight: bold; 
            margin: 0; 
            color: #e0f7fa;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            z-index: 1000;
        }

        .confirm-btn {
            background-color: #4cc9f0;
            color: #0a0d14;
            border: none;
            padding: 12px 80px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(76, 201, 240, 0.3);
        }

        .confirm-btn:hover { background-color: #4895ef; transform: scale(1.05); color: #fff; }
        .confirm-btn:disabled { 
            background-color: #333; 
            color: #777;
            cursor: not-allowed; 
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>秘法會 - 組合帳號查詢</h1>
    <div class="grid" id="product-list"></div>
</div>

<div class="footer-bar">
    <button class="confirm-btn" id="confirm-btn" disabled>請選擇想要的角色</button>
</div>

<script>
    // 根據你提供的 secretmethod 檔案清單整理的角色名單
    var gameItems = [
        { name: '卡埃德', code: 'SM01' }, { name: '弗恩', code: 'SM02' }, { name: '瓦蕾亞', code: 'SM03' }, { name: '伊尼特', code: 'SM04' },
        { name: '托爾斯克', code: 'SM05' }, { name: '艾洛溫', code: 'SM06' }, { name: '艾瑞斯', code: 'SM07' }, { name: '克美特', code: 'SM08' },
        { name: '努美拉', code: 'SM09' }, { name: '奈理莎', code: 'SM10' }, { name: '居魯士', code: 'SM11' }, { name: '波瑞斯', code: 'SM12' },
        { name: '阿諾菈', code: 'SM13' }, { name: '哪吒', code: 'SM14' }, { name: '埃澤恩', code: 'SM15' }, { name: '娜斯伽', code: 'SM16' },
        { name: '馬爾里克', code: 'SM17' }, { name: '莫里登', code: 'SM18' }, { name: '萊拉', code: 'SM19' }, { name: '塔倫', code: 'SM20' },
        { name: '達麗亞', code: 'SM21' }, { name: '達蘇彌', code: 'SM22' }, { name: '碧雅翡絲', code: 'SM23' }, { name: '維諾瑪', code: 'SM24' },
        { name: '緋爾沙', code: 'SM25' }, { name: '赫爾加', code: 'SM26' }, { name: '賽勒涅', code: 'SM27' }, { name: '賽雷菲娜', code: 'SM28' }
    ];

    var listElement = document.getElementById('product-list');
    var confirmBtn = document.getElementById('confirm-btn');
    var selectedCodes = new Set();

    gameItems.forEach(function(item) {
        // 圖片路徑指向 image/secretmethod/
        var imageUrl = 'image/secretmethod/' + item.name + '.png';
        
        var div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <img src="${imageUrl}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/172x252?text=No+Img'">
            <div class="card-content">
                <div class="card-title">${item.name}</div>
            </div>
        `;
        
        div.onclick = function() {
            if (selectedCodes.has(item.code)) {
                selectedCodes.delete(item.code);
                div.classList.remove('selected');
            } else {
                selectedCodes.add(item.code);
                div.classList.add('selected');
            }
            
            if (selectedCodes.size > 0) {
                confirmBtn.disabled = false;
                confirmBtn.innerText = '確認選取 (' + selectedCodes.size + ') 並搜尋';
            } else {
                confirmBtn.disabled = true;
                confirmBtn.innerText = '請選擇想要的角色';
            }
        };
        
        listElement.appendChild(div);
    });

    confirmBtn.onclick = function() {
        var finalCodes = Array.from(selectedCodes).sort().join(',');
        window.location.href = 'search_results.html?tags=' + finalCodes;
    };
</script>

</body>
</html>
