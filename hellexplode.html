<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>煉獄爆破 - 組合帳號查詢</title>
    <style>
        /* 採用熔岩與焦炭配色 */
        body { font-family: Arial, sans-serif; background-color: #1a0f0a; margin: 0; padding: 20px; padding-bottom: 120px; color: #fff; }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: #ff6600; margin-bottom: 30px; text-shadow: 0 0 15px rgba(255, 102, 0, 0.6); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 172px);
            gap: 15px;
            justify-content: center;
        }

        .card {
            background: #2b1d16;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            border: 3px solid transparent;
            position: relative;
        }

        /* 選取狀態：橘紅火光邊框 */
        .card.selected {
            border-color: #ff4500;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 69, 0, 0.5);
        }

        /* 勾選圖示 */
        .card.selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff4500;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            z-index: 2;
        }

        .card img {
            width: 100%;
            height: 252px;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        .card-content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(30, 10, 0, 0.95)); 
            padding: 15px 0 8px 0;
            text-align: center;
            pointer-events: none;
        }

        .card-title { 
            font-size: 15px; 
            font-weight: bold; 
            margin: 0; 
            color: #ffdfba;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* 統一的全透明 FooterBar */
        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(30, 30, 30, 0); 
            padding: 20px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0);
            display: flex;
            justify-content: center;
            z-index: 1000;
            pointer-events: none; /* 透明區域不擋點擊 */
        }

        .confirm-btn {
            pointer-events: auto; /* 恢復按鈕點擊 */
            background-color: #ff4500;
            color: white;
            border: none;
            padding: 12px 80px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.4);
        }

        .confirm-btn:hover { background-color: #ff6600; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <h1>煉獄爆破 - 組合帳號查詢</h1>
    <div class="grid" id="product-list"></div>
</div>

<div class="footer-bar">
    <button class="confirm-btn" id="confirm-btn">返回選陣營</button>
</div>

<script>
    var gameItems = [
        { name: '弗爾西', code: 'HE01' }, { name: '艾莉恩', code: 'HE02' }, { name: '亞洛特', code: 'HE03' },
        { name: '阿納伊', code: 'HE04' }, { name: '索爾卡登絲', code: 'HE05' }, { name: '茲麗特', code: 'HE06' },
        { name: '馬爾里克', code: 'HE07' }, { name: '萊拉', code: 'HE08' }, { name: '貂蟬', code: 'HE09' },
        { name: '奧里姆', code: 'HE10' }, { name: '赫克斯', code: 'HE11' }, { name: '澤娜', code: 'HE12' },
        { name: '諾克圖恩', code: 'HE13' }, { name: '賽特拉姆', code: 'HE14' }, { name: '邁卡', code: 'HE15' },
        { name: '雙生魔', code: 'HE16' }, { name: '魔君菲尼亞斯', code: 'HE17' }
    ];

    var listElement = document.getElementById('product-list');
    var confirmBtn = document.getElementById('confirm-btn');

    // 跨頁面同步選取清單
    var selectedRoles = new Set(JSON.parse(localStorage.getItem('selectedRoles') || '[]'));

    function updateButton() {
        const count = selectedRoles.size;
        confirmBtn.innerText = count > 0 ? `確認並返回 (${count})` : '返回選陣營';
        localStorage.setItem('selectedRoles', JSON.stringify(Array.from(selectedRoles)));
    }

    gameItems.forEach(function(item) {
        var imageUrl = 'image/hellexplode/' + item.name + '.png';
        var div = document.createElement('div');
        div.className = 'card';
        
        if (selectedRoles.has(item.code)) {
            div.classList.add('selected');
        }

        div.innerHTML = `
            <img src="${imageUrl}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/172x252?text=No+Img'">
            <div class="card-content">
                <div class="card-title">${item.name}</div>
            </div>
        `;
        
        div.onclick = function() {
            if (selectedRoles.has(item.code)) {
                selectedRoles.delete(item.code);
                div.classList.remove('selected');
            } else {
                selectedRoles.add(item.code);
                div.classList.add('selected');
            }
            updateButton();
        };
        
        listElement.appendChild(div);
    });

    updateButton();

    confirmBtn.onclick = function() {
        window.location.href = 'index.html';
    };
</script>

</body>
</html>
