<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北境王座 - 組合帳號查詢</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0d1117; margin: 0; padding: 20px; padding-bottom: 120px; color: #fff; }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: #58a6ff; margin-bottom: 30px; text-shadow: 0 0 10px rgba(88,166,255,0.3); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, 172px); gap: 15px; justify-content: center; }

        .card {
            background: #161b22; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: all 0.2s ease;
            display: flex; flex-direction: column; cursor: pointer;
            border: 3px solid transparent; position: relative;
        }

        .card.selected { border-color: #58a6ff; transform: translateY(-5px); box-shadow: 0 8px 25px rgba(88,166,255,0.3); }
        .card.selected::after {
            content: '✓'; position: absolute; top: 8px; right: 8px;
            background: #58a6ff; color: white; width: 24px; height: 24px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 14px; font-weight: bold; z-index: 2;
        }

        .card img { width: 100%; height: 252px; object-fit: cover; display: block; pointer-events: none; }
        .card-content {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9)); 
            padding: 15px 0 8px 0; text-align: center; pointer-events: none;
        }
        .card-title { font-size: 16px; font-weight: bold; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }

        /* 你要求的全透明 FooterBar */
        .footer-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(30, 30, 30, 0); 
            padding: 20px 0; display: flex; justify-content: center; z-index: 1000;
            pointer-events: none; /* 讓透明區域不擋點擊 */
        }

        .confirm-btn {
            pointer-events: auto; /* 恢復按鈕點擊 */
            background-color: #58a6ff; color: white; border: none;
            padding: 12px 80px; font-size: 18px; font-weight: bold;
            border-radius: 50px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(88,166,255,0.3);
        }
        .confirm-btn:hover { background-color: #1f6feb; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <h1>北境王座 - 組合帳號查詢</h1>
    <div class="grid" id="product-list"></div>
</div>

<div class="footer-bar">
    <button class="confirm-btn" id="confirm-btn">返回選陣營</button>
</div>

<script>
    var gameItems = [
        { name: '北境關羽', code: 'NK01' }, { name: '北境卡西爾', code: 'NK02' }, { name: '北境卡德格里姆', code: 'NK03' },
        { name: '北境布洛基爾', code: 'NK04' }, { name: '北境瓦爾基拉', code: 'NK05' }, { name: '北境米娜', code: 'NK06' },
        { name: '北境艾爾莉絲', code: 'NK07' }, { name: '北境艾德林', code: 'NK08' }, { name: '北境克羅多爾', code: 'NK09' },
        { name: '北境呂布', code: 'NK10' }, { name: '北境沙米爾', code: 'NK11' }, { name: '北境芬里斯', code: 'NK12' },
        { name: '北境阿斯特萊', code: 'NK13' }, { name: '北境阿爾黛雅', code: 'NK14' }, { name: '北境哈爾茲王', code: 'NK15' },
        { name: '北境埃爾德', code: 'NK16' }, { name: '北境格溫德琳', code: 'NK17' }, { name: '北境格雷休斯', code: 'NK18' },
        { name: '北境莎蒂', code: 'NK19' }, { name: '北境凱恩', code: 'NK20' }, { name: '北境琳克絲', code: 'NK21' },
        { name: '北境瑞文爾德', code: 'NK22' }, { name: '北境瑪爾蔚拉', code: 'NK23' }, { name: '北境緋爾莎', code: 'NK24' },
        { name: '北境德雷琳', code: 'NK25' }, { name: '北境潔拉', code: 'NK26' }, { name: '北境諾克圖恩', code: 'NK27' }
    ];

    var listElement = document.getElementById('product-list');
    var confirmBtn = document.getElementById('confirm-btn');

    // 跨陣營讀取
    var selectedRoles = new Set(JSON.parse(localStorage.getItem('selectedRoles') || '[]'));

    function updateBtn() {
        const count = selectedRoles.size;
        confirmBtn.innerText = count > 0 ? `確認並返回 (${count})` : '返回選陣營';
        localStorage.setItem('selectedRoles', JSON.stringify(Array.from(selectedRoles)));
    }

    gameItems.forEach(function(item) {
        var imageUrl = 'image/nkingseat/' + item.name + '.png';
        var div = document.createElement('div');
        div.className = 'card';
        if (selectedRoles.has(item.code)) div.classList.add('selected');

        div.innerHTML = `
            <img src="${imageUrl}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/172x252?text=No+Img'">
            <div class="card-content"><div class="card-title">${item.name}</div></div>
        `;
        
        div.onclick = function() {
            if (selectedRoles.has(item.code)) {
                selectedRoles.delete(item.code);
                div.classList.remove('selected');
            } else {
                selectedRoles.add(item.code);
                div.classList.add('selected');
            }
            updateBtn();
        };
        listElement.appendChild(div);
    });

    updateBtn();
    confirmBtn.onclick = function() { window.location.href = 'index.html'; };
</script>
</body>
</html>
