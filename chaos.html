<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>混沌征服者 - 組合帳號查詢</title>
    <style>
        /* 採用深紅與暗黑配色，展現征服者霸氣 */
        body { font-family: Arial, sans-serif; background-color: #120a0a; margin: 0; padding: 20px; padding-bottom: 120px; color: #fff; }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: #e63946; margin-bottom: 30px; text-shadow: 0 0 15px rgba(230, 57, 70, 0.6); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 172px);
            gap: 15px;
            justify-content: center;
        }

        .card {
            background: #1e1414;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            border: 3px solid #3d2b2b;
            position: relative;
        }

        /* 選取狀態：鮮紅發光邊框 */
        .card.selected {
            border-color: #ff0000;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 0, 0, 0.5);
        }

        /* 勾選圖示 */
        .card.selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff0000;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            z-index: 2;
        }

        .card img {
            width: 100%;
            height: 252px;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        .card-content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.95)); 
            padding: 15px 0 8px 0;
            text-align: center;
            pointer-events: none;
        }

        .card-title { 
            font-size: 16px; 
            font-weight: bold; 
            margin: 0; 
            color: #ffcccc;
            text-shadow: 1px 1px 3px rgba(0,0,0,1);
        }

        /* 你要求的全透明 FooterBar */
        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(30, 30, 30, 0); 
            padding: 20px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0);
            display: flex;
            justify-content: center;
            z-index: 1000;
            pointer-events: none; /* 讓透明層不擋住下方的點擊 */
        }

        .confirm-btn {
            pointer-events: auto; /* 讓按鈕可以被點擊 */
            background-color: #e63946;
            color: white;
            border: none;
            padding: 12px 80px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.4);
        }

        .confirm-btn:hover { background-color: #ff0000; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <h1>混沌征服者 - 組合帳號查詢</h1>
    <div class="grid" id="product-list"></div>
</div>

<div class="footer-bar">
    <button class="confirm-btn" id="confirm-btn">返回選陣營</button>
</div>

<script>
    // 角色清單
    var gameItems = [
        { name: '瓦爾德隆', code: 'CH01' },
        { name: '格漢', code: 'CH02' }
    ];

    var listElement = document.getElementById('product-list');
    var confirmBtn = document.getElementById('confirm-btn');

    // 跨陣營讀取資料
    var selectedCodes = new Set(JSON.parse(localStorage.getItem('selectedRoles') || '[]'));

    function updateButton() {
        const count = selectedCodes.size;
        confirmBtn.innerText = count > 0 ? `確認並返回 (${count})` : '返回選陣營';
        // 同步回 LocalStorage
        localStorage.setItem('selectedRoles', JSON.stringify(Array.from(selectedCodes)));
    }

    gameItems.forEach(function(item) {
        var imageUrl = 'image/chaos/' + item.name + '.png';
        
        var div = document.createElement('div');
        div.className = 'card';
        
        // 初始化選取狀態
        if (selectedCodes.has(item.code)) {
            div.classList.add('selected');
        }

        div.innerHTML = `
            <img src="${imageUrl}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/172x252?text=No+Img'">
            <div class="card-content">
                <div class="card-title">${item.name}</div>
            </div>
        `;
        
        div.onclick = function() {
            if (selectedCodes.has(item.code)) {
                selectedCodes.delete(item.code);
                div.classList.remove('selected');
            } else {
                selectedCodes.add(item.code);
                div.classList.add('selected');
            }
            updateButton();
        };
        
        listElement.appendChild(div);
    });

    // 初始按鈕狀態
    updateButton();

    confirmBtn.onclick = function() {
        // 點擊後回到首頁，資料已存入 localStorage
        window.location.href = 'index.html';
    };
</script>

</body>
</html>
